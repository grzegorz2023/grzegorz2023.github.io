<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz</title>
</head>
<body>
    <form action="https://formspree.io/f/xpzejdpg" method="POST">
        <label for="firstname">Imię:</label>
        <input type="text" name="firstname" id="firstname"><br>
        <label for="lastname">Nazwisko:</label>
        <input type="text" name="lastname" id="lastname"><br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email"><br>
        <label for="number">Telefon:</label>
        <input type="tel" name="quantity" id="number"><br>
        <label for="city">Wybór miasta</label>
        <select name="city" id="city">
            <option value="Kraków">Kraków</option>
            <option value="Warszawa">Warszawa</option>
            <option value="Gdańsk">Gdańsk</option>
        </select><br>
       <label><input type="radio" name="choise">mężczyzna</label><br>
        <label><input type="radio" name="choise">kobieta</label><br>
        <label><input type="checkbox" name="agreement">Zgoda na przetwarzanie danych osobowych.</label><br>
        <label for="message">Wiadomość</label>
        <textarea name="message" id="message"></textarea><br>
        <input type="submit" value="Wyślij">
    </form>
</body>
</html>
